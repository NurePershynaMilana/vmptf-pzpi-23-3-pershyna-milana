<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Збір</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; padding: 32px; }
  .back { display: inline-block; margin-bottom: 20px; color: #2980b9; text-decoration: none; font-size: 14px; }
  .back:hover { text-decoration: underline; }
  h1 { font-size: 24px; color: #2c3e50; margin-bottom: 24px; }
  .form-card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px; }
  .form-card p { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
  input:focus, textarea:focus { outline: none; border-color: #2980b9; }
  .btn { display: inline-block; padding: 10px 20px; background: #2980b9; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; }
  .btn:hover { background: #2471a3; }
</style>
</head>
<body>
<a class="back" href="{% url 'org_detail' org.pk %}">← Назад</a>
<h1>Збір для {{ org.name }}</h1>
<div class="form-card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Зберегти</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Список користувачів — Рівень 3, Завдання 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="level3_task1.css"/>
</head>
<body>

<header class="site-header">
  <div class="site-title">UserBoard</div>
  <div class="site-badge">Рівень 3 · Завдання 1</div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Пошук за іменем або email..."/>
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">Всі</button>
    <button class="filter-btn" data-filter="ЦА">ЦА</button>
    <button class="filter-btn" data-filter="Постійні клієнти">Постійні</button>
    <button class="filter-btn" data-filter="Інші">Інші</button>
  </div>
  <button class="add-btn" id="btn-add">＋ Додати</button>
</div>

<div class="stats-bar">
  <div class="stat-item">Всього: <span class="stat-value" id="stat-total">—</span></div>
  <div class="stat-item">ЦА: <span class="stat-value" id="stat-ca">—</span></div>
  <div class="stat-item">Постійні: <span class="stat-value" id="stat-reg">—</span></div>
  <div class="stat-item">Інші: <span class="stat-value" id="stat-other">—</span></div>
</div>

<div class="container">
  <div class="grid" id="users-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Новий користувач</div>

    <div class="form-group">
      <label class="form-label">Ім'я</label>
      <input class="form-input" id="f-name" type="text" placeholder="Ім'я Прізвище"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="f-email" type="text" placeholder="user@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Посада</label>
      <input class="form-input" id="f-role" type="text" placeholder="Менеджер, розробник..."/>
    </div>
    <div class="form-group">
      <label class="form-label">Група</label>
      <select class="form-select" id="f-group">
        <option value="ЦА">ЦА</option>
        <option value="Постійні клієнти">Постійні клієнти</option>
        <option value="Інші">Інші</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="btn-cancel">Скасувати</button>
      <button class="btn-save" id="btn-save">Зберегти</button>
    </div>
  </div>
</div>

<script src="level3_task1.js"></script>
</body>
</html>
